name: Normalize existing trails

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Existing Geofabrik source"
        required: true
        default: "osm-geofabrik-tennessee"
        type: string

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}

    steps:
      - name: Check out Waymark
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Add RENDER_DATABASE_URL in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Apply migrations
        run: python scripts/migrate.py

      - name: Normalize trails
        env:
          SOURCE: ${{ inputs.source }}
        run: python scripts/normalize_existing_trails.py --source "$SOURCE"
