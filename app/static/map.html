<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waymark Trail Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.10.0/dist/maplibre-gl.css"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #18201b;
        --muted: #68736c;
        --panel: #ffffff;
        --trail: #df4f37;
        --trail-dark: #8f2c1e;
        --ring: rgba(24, 32, 27, 0.14);
        --field: #f8f6f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #map {
        position: fixed;
        inset: 0;
      }

      .topbar {
        position: fixed;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .brand,
      .stats {
        pointer-events: auto;
        border: 1px solid var(--ring);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 14px 40px rgba(35, 39, 34, 0.18);
        backdrop-filter: blur(10px);
      }

      .brand {
        width: min(680px, calc(100vw - 260px));
        padding: 12px 14px;
      }

      .controls {
        display: grid;
        grid-template-columns:
          minmax(130px, 1.3fr)
          minmax(100px, 1fr)
          minmax(70px, 0.65fr)
          minmax(82px, 0.65fr)
          minmax(70px, 0.55fr)
          auto;
        gap: 8px;
        margin-top: 10px;
      }

      .controls input,
      .controls select,
      .controls button {
        min-width: 0;
        min-height: 34px;
        border: 1px solid var(--ring);
        border-radius: 7px;
        padding: 0 9px;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        background: var(--field);
      }

      .controls button {
        color: #fff;
        font-weight: 750;
        background: var(--trail);
        cursor: pointer;
      }

      .presets {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .presets button {
        min-height: 28px;
        border: 1px solid var(--ring);
        border-radius: 999px;
        padding: 0 9px;
        color: var(--ink);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        background: #fff;
        cursor: pointer;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 750;
        letter-spacing: 0;
      }

      .brand p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.3;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(86px, 1fr));
        min-width: 210px;
        overflow: hidden;
      }

      .stat {
        padding: 11px 13px;
      }

      .stat + .stat {
        border-left: 1px solid var(--ring);
      }

      .stat strong {
        display: block;
        font-size: 18px;
        line-height: 1;
      }

      .stat span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .maplibregl-popup-content {
        border-radius: 8px;
        padding: 12px;
      }

      .popup-title {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 750;
      }

      .popup-meta {
        margin: 0;
        color: #59635d;
        font-size: 12px;
        line-height: 1.45;
      }

      @media (max-width: 640px) {
        .topbar {
          top: 10px;
          left: 10px;
          right: 10px;
          align-items: stretch;
          flex-direction: column;
        }

        .brand,
        .stats {
          width: 100%;
        }

        .controls {
          grid-template-columns: 1fr 1fr;
        }

        .controls select {
          grid-column: span 2;
        }

        .controls button {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <main id="map" aria-label="Waymark trail map"></main>
    <aside class="topbar">
      <section class="brand" aria-label="Map title">
        <h1>Waymark</h1>
        <p id="map-subtitle">Trail data</p>
        <form id="filter-form" class="controls" autocomplete="off">
          <select id="source-input" aria-label="Source">
            <option value="">All sources</option>
            <option value="nps-public-trails-grsm">NPS Smokies</option>
            <option value="osm-geofabrik-tennessee">OSM Tennessee</option>
          </select>
          <input id="city-input" aria-label="City" placeholder="City" />
          <input id="state-input" aria-label="State" placeholder="State" />
          <input
            id="radius-input"
            aria-label="Radius in kilometers"
            inputmode="decimal"
            placeholder="Radius km"
          />
          <input id="limit-input" aria-label="Limit" inputmode="numeric" placeholder="Limit" />
          <button type="submit">Load</button>
        </form>
        <div class="presets" aria-label="Map presets">
          <button type="button" data-source="nps-public-trails-grsm" data-state="" data-limit="500">
            NPS Smokies
          </button>
          <button type="button" data-source="osm-geofabrik-tennessee" data-state="TN" data-limit="500">
            OSM TN
          </button>
          <button type="button" data-source="" data-state="TN" data-limit="500">
            All TN
          </button>
          <button
            type="button"
            data-source=""
            data-city="Chattanooga"
            data-state="TN"
            data-radius="30"
            data-limit="100"
          >
            Chattanooga 30 km
          </button>
        </div>
      </section>
      <section class="stats" aria-label="Trail statistics">
        <div class="stat">
          <strong id="trail-count">0</strong>
          <span>trails loaded</span>
        </div>
        <div class="stat">
          <strong id="source-label">All</strong>
          <span>source</span>
        </div>
      </section>
    </aside>

    <script src="https://unpkg.com/maplibre-gl@5.10.0/dist/maplibre-gl.js"></script>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        center: [-83.49, 35.62],
        zoom: 9,
        style: {
          version: 8,
          sources: {
            osm: {
              type: "raster",
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256,
              attribution: "OpenStreetMap contributors",
            },
          },
          layers: [
            {
              id: "osm",
              type: "raster",
              source: "osm",
            },
          ],
        },
      });

      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-right");

      const params = new URLSearchParams(window.location.search);
      const sourceInput = document.getElementById("source-input");
      const cityInput = document.getElementById("city-input");
      const stateInput = document.getElementById("state-input");
      const radiusInput = document.getElementById("radius-input");
      const limitInput = document.getElementById("limit-input");
      const subtitle = document.getElementById("map-subtitle");
      const trailCount = document.getElementById("trail-count");
      const sourceLabel = document.getElementById("source-label");

      sourceInput.value = params.get("source") || "";
      cityInput.value = params.get("city") || "";
      stateInput.value = params.get("state") || "";
      radiusInput.value = params.get("radius_km") || "30";
      limitInput.value = params.get("limit") || "500";

      function clean(value) {
        return value || "Unknown";
      }

      function extendBounds(bounds, coordinates) {
        if (typeof coordinates[0] === "number") {
          bounds.extend(coordinates);
          return;
        }

        coordinates.forEach((child) => extendBounds(bounds, child));
      }

      function popupHtml(properties) {
        return `
          <h2 class="popup-title">${clean(properties.name)}</h2>
          <p class="popup-meta">
            ${clean(properties.difficulty)}<br />
            Surface: ${clean(properties.surface)}<br />
            Status: ${clean(properties.status)}
          </p>
        `;
      }

      function queryUrl() {
        const query = new URLSearchParams();
        const source = sourceInput.value.trim();
        const city = cityInput.value.trim();
        const state = stateInput.value.trim();
        const radius = radiusInput.value.trim() || "30";
        const limit = limitInput.value.trim() || "500";

        if (city) {
          query.set("city", city);
          query.set("state", state);
          query.set("radius_km", radius);
          query.set("limit", limit);
          return `/api/trails/nearby?${query.toString()}`;
        }

        if (source) query.set("source", source);
        if (state) query.set("state", state);
        query.set("limit", limit);

        return `/api/trails.geojson?${query.toString()}`;
      }

      function updateUrl() {
        const query = new URLSearchParams();
        const source = sourceInput.value.trim();
        const city = cityInput.value.trim();
        const state = stateInput.value.trim();
        const radius = radiusInput.value.trim();
        const limit = limitInput.value.trim();

        if (source && !city) query.set("source", source);
        if (city) query.set("city", city);
        if (state) query.set("state", state);
        if (city && radius) query.set("radius_km", radius);
        if (limit) query.set("limit", limit);
        window.history.replaceState(null, "", `/map?${query.toString()}`);
      }

      function updateLabels(collection) {
        const source = sourceInput.value.trim();
        const city = cityInput.value.trim();
        const state = stateInput.value.trim();
        const radius = radiusInput.value.trim();
        trailCount.textContent = collection.features.length;
        sourceLabel.textContent = city
          ? "Nearby"
          : source
          ? source
              .replace("nps-public-trails-", "nps-")
              .replace("osm-overpass-", "osm-")
              .replace("osm-geofabrik-", "osm-")
          : "All";
        subtitle.textContent = [
          city ? `${city}, ${state}` : source || "All trail sources",
          city ? `${radius} km radius` : state ? `state ${state}` : "",
        ]
          .filter(Boolean)
          .join(" · ");
      }

      async function loadTrails() {
        subtitle.textContent = "Loading trails";
        updateUrl();
        const response = await fetch(queryUrl());
        const collection = await response.json();
        if (!response.ok) {
          subtitle.textContent = collection.detail || "Unable to load trails";
          return;
        }
        updateLabels(collection);

        if (map.getSource("trails")) {
          map.getSource("trails").setData(collection);
        } else {
          map.addSource("trails", {
            type: "geojson",
            data: collection,
          });

          map.addLayer({
            id: "trail-glow",
            type: "line",
            source: "trails",
            paint: {
              "line-color": "#ffffff",
              "line-opacity": 0.9,
              "line-width": 7,
            },
          });

          map.addLayer({
            id: "trails",
            type: "line",
            source: "trails",
            paint: {
              "line-color": ["case", ["boolean", ["feature-state", "hover"], false], "#8f2c1e", "#df4f37"],
              "line-opacity": 0.95,
              "line-width": ["case", ["boolean", ["feature-state", "hover"], false], 5, 3],
            },
          });
        }

        const bounds = new maplibregl.LngLatBounds();
        collection.features.forEach((feature) => {
          if (feature.geometry?.coordinates) {
            extendBounds(bounds, feature.geometry.coordinates);
          }
        });

        if (!bounds.isEmpty()) {
          map.fitBounds(bounds, {
            padding: { top: 170, right: 28, bottom: 34, left: 28 },
            maxZoom: 12,
            duration: 0,
          });
        }
      }

      map.on("load", async () => {
        await loadTrails();

        let hoveredId = null;
        map.on("mousemove", "trails", (event) => {
          map.getCanvas().style.cursor = "pointer";
          if (hoveredId !== null) {
            map.setFeatureState({ source: "trails", id: hoveredId }, { hover: false });
          }
          hoveredId = event.features[0].id;
          map.setFeatureState({ source: "trails", id: hoveredId }, { hover: true });
        });

        map.on("mouseleave", "trails", () => {
          map.getCanvas().style.cursor = "";
          if (hoveredId !== null) {
            map.setFeatureState({ source: "trails", id: hoveredId }, { hover: false });
          }
          hoveredId = null;
        });

        map.on("click", "trails", (event) => {
          new maplibregl.Popup()
            .setLngLat(event.lngLat)
            .setHTML(popupHtml(event.features[0].properties))
            .addTo(map);
        });
      });

      document.getElementById("filter-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        await loadTrails();
      });

      cityInput.addEventListener("input", () => {
        if (cityInput.value.trim()) {
          sourceInput.value = "";
        }
      });

      sourceInput.addEventListener("change", () => {
        if (sourceInput.value) {
          cityInput.value = "";
        }
      });

      document.querySelector(".presets").addEventListener("click", async (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        sourceInput.value = button.dataset.source;
        cityInput.value = button.dataset.city || "";
        stateInput.value = button.dataset.state;
        radiusInput.value = button.dataset.radius || "30";
        limitInput.value = button.dataset.limit;
        await loadTrails();
      });
    </script>
  </body>
</html>
